# ══════════════════════════════════════════════════════════════════════════════
#  COGITATOR SECURITY TERMINAL — hyprlock config
#  Desktop screenshot is processed into a phosphor CRT green standby display.
#  All text rendered over the top in the standard Mechanicus palette.
# ══════════════════════════════════════════════════════════════════════════════

background {
    monitor =
    path = screenshot
    shader = ~/.config/hypr/shaders/lockscreen.glsl
    blur_passes = 6
}


# ── Header ────────────────────────────────────────────────────────────────────

label {
    monitor =
    text = ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    color = rgba(1a7a1aff)
    font_size = 16
    font_family = VT323
    halign = center
    valign = top
    position = 0, 15
}

label {
    monitor =
    text = ⚙  ADEPTUS MECHANICUS  //  COGITATOR SECURITY TERMINAL  ⚙
    color = rgba(1a7a1aff)
    font_size = 22
    font_family = VT323
    halign = center
    valign = top
    position = 0, 40
    shadow_passes = 1
    shadow_size = 4
    shadow_color = rgba(39ff1433)
}

label {
    monitor =
    text = ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    color = rgba(1a7a1aff)
    font_size = 16
    font_family = VT323
    halign = center
    valign = top
    position = 0, 68
}


# ── Content frame corners (tacbracks) ─────────────────────────────────────────

label {
    monitor =
    text = ╔
    color = rgba(1a7a1aff)
    font_size = 22
    font_family = VT323
    halign = left
    valign = top
    position = 30, 82
}

label {
    monitor =
    text = ╗
    color = rgba(1a7a1aff)
    font_size = 22
    font_family = VT323
    halign = right
    valign = top
    position = -30, 82
}

label {
    monitor =
    text = ╚
    color = rgba(1a7a1aff)
    font_size = 22
    font_family = VT323
    halign = left
    valign = bottom
    position = 30, 78
}

label {
    monitor =
    text = ╝
    color = rgba(1a7a1aff)
    font_size = 22
    font_family = VT323
    halign = right
    valign = bottom
    position = -30, 78
}


# ── Date ──────────────────────────────────────────────────────────────────────

label {
    monitor =
    text = cmd[update:60000]:date +"%A  %d %B  %Y" | tr '[:lower:]' '[:upper:]'
    color = rgba(1a7a1aff)
    font_size = 28
    font_family = VT323
    halign = center
    valign = center
    position = 0, 320
    shadow_passes = 1
    shadow_size = 3
    shadow_color = rgba(39ff1422)
}


# ── Clock ─────────────────────────────────────────────────────────────────────

label {
    monitor =
    text = cmd[update:1000]:date +"%H:%M:%S"
    color = rgba(39ff14ff)
    font_size = 110
    font_family = VT323
    halign = center
    valign = center
    position = 0, 170
    shadow_passes = 3
    shadow_size = 8
    shadow_color = rgba(39ff1455)
    shadow_boost = 1.4
}


# ── Divider ───────────────────────────────────────────────────────────────────

label {
    monitor =
    text = ─────────────────────────────────────────────────────────────────────────────────────────────────────────
    color = rgba(1a7a1aff)
    font_size = 14
    font_family = VT323
    halign = center
    valign = center
    position = 0, 40
}


# ── Verification prompt ───────────────────────────────────────────────────────

label {
    monitor =
    text = IDENTITY VERIFICATION REQUIRED
    color = rgba(1a7a1aff)
    font_size = 24
    font_family = VT323
    halign = center
    valign = center
    position = 0, 10
    shadow_passes = 1
    shadow_size = 3
    shadow_color = rgba(39ff1422)
}


# ── Input field ───────────────────────────────────────────────────────────────

input-field {
    monitor =
    size = 440, 54
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.20
    dots_center = true
    outer_color = rgba(1a7a1aff)
    inner_color = rgba(000000ff)
    font_color = rgba(39ff14ff)
    font_family = VT323
    fade_on_empty = false
    placeholder_text = <span foreground="##1a7a1a" font_desc="VT323 22">ENTER CIPHER...</span>
    fail_text = <span foreground="##cc4400" font_desc="VT323 20">⚠  ACCESS DENIED  —  MECHANICUS HAS BEEN NOTIFIED</span>
    fail_transition = 400
    capslock_color = rgba(cc4400ff)
    check_color = rgba(39ff14ff)
    fail_color = rgba(cc4400ff)
    rounding = 0
    position = 0, -70
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 6
    shadow_color = rgba(39ff1433)
}


# ── Footer ────────────────────────────────────────────────────────────────────

label {
    monitor =
    text = ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    color = rgba(1a7a1aff)
    font_size = 16
    font_family = VT323
    halign = center
    valign = bottom
    position = 0, 52
}

label {
    monitor =
    text = THOUGHT FOR THE DAY: AN UNEXAMINED DATA-CIPHER IS A HERESY WAITING TO HAPPEN.
    color = rgba(0a3300ff)
    font_size = 20
    font_family = VT323
    halign = center
    valign = bottom
    position = 0, 28
}

label {
    monitor =
    text = ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    color = rgba(1a7a1aff)
    font_size = 16
    font_family = VT323
    halign = center
    valign = bottom
    position = 0, 8
}
