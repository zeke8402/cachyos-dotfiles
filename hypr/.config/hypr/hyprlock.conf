# hyprlock — matrix rain background, gruvbox UI

background {
    monitor =
    path = screenshot
    shader = ~/.config/hypr/shaders/lockscreen.glsl
    blur_passes = 1
}


# ── Date ──────────────────────────────────────────────────────────────────────

label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %-d"
    color = rgba(a89984ff)
    font_size = 16
    font_family = Lexend
    halign = center
    valign = center
    position = 0, 130
}


# ── Clock ─────────────────────────────────────────────────────────────────────

label {
    monitor =
    text = cmd[update:1000] date +"%H:%M:%S"
    color = rgba(fabd2fff)
    font_size = 96
    font_family = Lexend
    halign = center
    valign = center
    position = 0, 30
    shadow_passes = 2
    shadow_size = 10
    shadow_color = rgba(00000099)
}


# ── Password field ────────────────────────────────────────────────────────────

input-field {
    monitor =
    size = 360, 52
    outline_thickness = 2
    dots_size = 0.28
    dots_spacing = 0.18
    dots_center = true
    outer_color = rgba(3c3836ff)
    inner_color = rgba(282828ee)
    font_color = rgba(ebdbb2ff)
    font_family = Lexend
    fade_on_empty = true
    placeholder_text = <span foreground="##665c54" font_desc="Lexend 14">Password</span>
    fail_text = <span foreground="##fb4934" font_desc="Lexend 14">Incorrect password</span>
    capslock_color = rgba(fe8019ff)
    check_color = rgba(fabd2fff)
    fail_color = rgba(fb4934ff)
    rounding = 8
    position = 0, -80
    halign = center
    valign = center
    shadow_passes = 1
    shadow_size = 6
    shadow_color = rgba(00000088)
}
