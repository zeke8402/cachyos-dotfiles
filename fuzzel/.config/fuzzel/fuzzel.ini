[main]
font=VT323:size=20
dpi-aware=no
prompt=>
lines=12
width=42
horizontal-pad=20
vertical-pad=12
inner-pad=6
image-size-ratio=0.0
icons-enabled=no
anchor=center
layer=overlay
exit-on-keyboard-focus-loss=yes

[colors]
# Black background
background=000000ff
# Dim green for non-matching text — makes matches pop
text=1a7a1aff
# Bright phosphor green for matched characters
match=39ff14ff
# Bright green fill for selected row — mirrors active button style
selection=39ff14ff
# Black text on selected row
selection-text=000000ff
# Black for matched chars within the selected row (bg is already green)
selection-match=000000ff
# Medium green border
border=1a7a1aff

[border]
width=3
radius=0
